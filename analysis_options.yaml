# This file configures the Dart analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "build/**"
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  errors:
    invalid_annotation_target: ignore
    todo: ignore

linter:
  # The lint rules applied to this project can be customized in the
  # section below to disable rules from the `package:flutter_lints/flutter.yaml`
  # included above or to enable additional rules. A list of all available lints
  # and their documentation is published at https://dart.dev/lints.
  rules:
    # -------------------------------------------------------------------------
    # Error Prevention / Safety
    # -------------------------------------------------------------------------
    avoid_print: false                     # Allowed for quick local debugging, but prefer logs in production
    close_sinks: true                      # Prevents memory leaks by ensuring StreamControllers and Sinks are closed
    cancel_subscriptions: true             # Prevents memory leaks by ensuring StreamSubscriptions are cancelled
    await_only_futures: true               # Avoids using 'await' on non-futures
    unawaited_futures: true                # Ensures that Futures are handled or marked as unawaited
    avoid_empty_else: true                 # Detects empty else clauses
    no_duplicate_case_values: true         # Detects duplicate switch case values
    unrelated_type_equality_checks: true   # Detects comparison of non-compatible types

    # -------------------------------------------------------------------------
    # Code Quality & Style
    # -------------------------------------------------------------------------
    prefer_single_quotes: true             # Enforces single quotes for string literals
    sort_constructors_first: true          # Puts constructors before other members in a class
    sort_pub_dependencies: true            # Keeps dependencies sorted in pubspec.yaml
    always_declare_return_types: true     # Ensures return types are explicitly declared
    prefer_final_fields: true              # Encourages use of final for private fields when possible
    prefer_final_locals: true              # Encourages final for local variables
    always_put_required_named_parameters_first: true # Groups required parameters first

    # -------------------------------------------------------------------------
    # Performance & Optimization
    # -------------------------------------------------------------------------
    prefer_const_constructors: true        # Enforces const constructors for stateless widgets/elements
    prefer_const_literals_to_create_immutables: true # Enforces const arrays/maps
    prefer_const_declarations: true        # Enforces const on declarations where possible
    unnecessary_const: true                # Removes redundant const keywords
    unnecessary_new: true                  # Removes deprecated 'new' keyword usage

    # -------------------------------------------------------------------------
    # Flutter-Specific
    # -------------------------------------------------------------------------
    avoid_unnecessary_containers: true     # Recommends avoiding redundant Container widgets
    use_key_in_widget_constructors: true   # Enforces using keys in widget constructors
    avoid_web_libraries_in_flutter: true   # Prevents importing html/js libraries in cross-platform code
